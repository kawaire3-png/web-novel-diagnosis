  <style>
    :root {
      color-scheme: light;
      --bg: #eef6fb;
      --panel: #ffffff;
      --panel-soft: #f7fbfe;
      --text: #1f2d3a;
      --muted: #61717f;
      --line: #d8e8f2;
      --accent: #1f83b6;
      --accent-2: #0b6fae;
      --accent-3: #53a9d8;
      --paper: #ffffff;
      --ink: #1f2d3a;
      --radius: 24px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at 18% 8%, rgba(31, 131, 182, .10), transparent 26rem),
        radial-gradient(circle at 86% 20%, rgba(83, 169, 216, .12), transparent 24rem),
        var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 22px;
      position: relative;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(100%, 420px);
      min-height: 640px;
      display: flex;
      align-items: center;
    }

    .screen {
      width: 100%;
      display: none;
    }

    .screen.is-active {
      display: block;
    }

    .card {
      width: 100%;
      background: var(--panel);
      border-radius: var(--radius);
      border: 1px solid var(--line);
      box-shadow: 0 18px 48px rgba(31, 84, 125, .14);
      padding: 20px;
      overflow: hidden;
    }

    .start-card {
      padding: 32px 20px 22px;
      border-top: 5px solid var(--accent);
    }

    .eyebrow,
    .progress-label,
    .section-label {
      color: var(--accent);
      font-size: 14px;
      font-weight: 900;
      letter-spacing: .08em;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      margin-top: 8px;
      font-size: 34px;
      line-height: 1.12;
      letter-spacing: 0;
      color: #1d2a36;
    }

    h2 {
      margin-top: 12px;
      font-size: 27px;
      line-height: 1.35;
      letter-spacing: 0;
      color: #1d2a36;
    }

    .lead {
      margin-top: 14px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.75;
    }

    .primary,
    .choice,
    .subtle,
    .share {
      width: 100%;
      border: 0;
      border-radius: 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 56px;
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }

    .primary {
      margin-top: 28px;
      background: var(--accent);
      color: white;
      font-size: 17px;
      font-weight: 800;
      box-shadow: 0 7px 0 #0b5f94;
    }

    .primary:active,
    .choice:active,
    .subtle:active,
    .share:active {
      transform: scale(.985);
    }

    .note {
      margin-top: 16px;
      color: #728391;
      font-size: 12px;
      line-height: 1.7;
    }

    .meter {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: #dcecf5;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .meter span {
      display: block;
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent-2), var(--accent-3));
      transition: width .22s ease;
    }

    .choices {
      display: grid;
      gap: 12px;
      margin-top: 28px;
    }

    .choice {
      justify-content: flex-start;
      text-align: left;
      background: var(--paper);
      color: var(--ink);
      border: 1px solid var(--line);
      padding: 15px 18px;
      line-height: 1.45;
      min-height: 60px;
      font-size: 16px;
      font-weight: 650;
      box-shadow: 0 3px 0 #e3eef5;
    }

    .choice:hover,
    .choice:focus-visible {
      border-color: var(--accent);
      background: #f3faff;
      outline: 0;
    }

    .question-footer {
      display: flex;
      margin-top: 18px;
    }

    .subtle {
      width: auto;
      min-height: 38px;
      border-radius: 999px;
      padding: 0 18px;
      color: #526a7b;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 14px;
      font-weight: 650;
    }

    .result-card {
      padding: 20px;
    }

    .result-code {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .badge {
      border: 1px solid #cae3f3;
      border-radius: 999px;
      padding: 6px 10px;
      color: #0b6fae;
      background: #e8f5fc;
      font-size: 12px;
      font-weight: 700;
    }

    .result-title {
      margin-top: 10px;
      font-size: 34px;
      line-height: 1.1;
      font-weight: 900;
    }

    .result-info {
      margin-top: 22px;
      border: 1px solid var(--line);
      background: var(--panel-soft);
      border-radius: 22px;
      padding: 18px 20px;
    }

    .info-block {
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }

    .info-block:first-child {
      padding-top: 0;
    }

    .info-block:last-child {
      padding-bottom: 0;
      border-bottom: 0;
    }

    .info-text {
      margin-top: 7px;
      font-size: 19px;
      font-weight: 700;
      line-height: 1.55;
    }

    .synopsis {
      font-size: 15px;
      font-weight: 600;
      color: #4f6270;
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .share {
      background: var(--accent);
      color: white;
      font-weight: 800;
      box-shadow: 0 5px 0 #0b5f94;
    }

    .again {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    @media (max-width: 380px) {
      body {
        padding: 14px;
      }

      .card,
      .result-card {
        padding: 18px;
        border-radius: 24px;
      }

      h1,
      .result-title {
        font-size: 30px;
      }

      h2 {
        font-size: 24px;
      }

      .choice {
        padding: 13px 15px;
      }
    }
  </style>
</head>

  <main class="app" aria-live="polite">
    <section class="screen is-active" id="start-screen">
      <div class="card start-card">
        <p class="eyebrow">なろうカクヨム度100%</p>
        <h1>Web小説家診断</h1>
        <p class="lead">１２問で、あなたが書くWeb小説のジャンルと主人公属性を勝手に診断します。</p>

        <p class="note">※ネタ診断です。<br>※結果コメントはだいぶ偏見です。</p>
      </div>
    </section>

    <section class="screen" id="question-screen">
      <div class="card">
        <div class="meter" aria-hidden="true"><span id="meter-bar"></span></div>
        <p class="progress-label" id="progress-label">Q1 / 12</p>
        <h2 id="question-title"></h2>
        <div class="choices" id="choices"></div>
        <div class="question-footer">
          <button class="subtle" id="back-button" type="button">ひとつ戻る</button>
        </div>
      </div>
    </section>

    <section class="screen" id="result-screen">
      <div class="card result-card">
        <div class="result-code">
          <p class="eyebrow" id="result-code">診断結果</p>
          <span class="badge" id="result-badge"></span>
        </div>
        <h2 class="result-title" id="result-name"></h2>
        <div class="result-info">
          <div class="info-block">
            <p class="section-label">あなたのWeb小説タイトル</p>
            <p class="info-text" id="novel-title"></p>
          </div>
          <div class="info-block">
            <p class="section-label">ジャンル</p>
            <p class="info-text" id="genre"></p>
          </div>
          <div class="info-block">
            <p class="section-label">主人公属性</p>
            <p class="info-text" id="hero-type"></p>
          </div>
          <div class="info-block">
            <p class="section-label">あらすじ</p>
            <p class="info-text synopsis" id="synopsis"></p>
          </div>
          <div class="info-block">
            <p class="section-label">読者に刺さるポイント</p>
            <p class="info-text" id="hook"></p>
          </div>
          <div class="info-block">
            <p class="section-label">書き手向け偏見コメント</p>
            <p class="info-text" id="comment"></p>
          </div>
        </div>
        <div class="actions">
          <a class="share" id="x-share" target="_blank" rel="noopener">Xで結果をシェア</a>
          <button class="share again" id="again-button" type="button">もう一回やる</button>
        </div>
      </div>
    </section>
  </main>

        hero: "空気を翻訳しすぎる仲裁役",
        synopsis: "言葉が通じない獣人国へ送られた主人公は、なぜか本音だけを聞き取れる。誤解だらけの国境で、会話ひとつが戦争と恋を止めていく。",
        hook: "言えない本音が少しずつ届くじれったさ",
        comment: "言えない本音と誤解の解消で、じれったい関係性を育てるのが得意そう",
        colors: ["#fb923c", "#38bdf8", "#1c1612"]
      },
      academy: {
        code: "MAGIC",
        name: "魔法学園の落第生",
        title: "落第魔術師、補習で古代式を証明する",
        genre: "魔法学園 / 努力 / 逆転",
        hero: "納得するまで諦めない検証型主人公",
        synopsis: "才能なしと判定された主人公は、現代魔法に適性がないだけだった。補習室の片隅で古代式を再現し、学園の常識をひとつずつ塗り替える。",
        hook: "努力と発見がきちんと報われる高揚感",
        comment: "努力と検証の積み上げで逆転するので、読者に納得感を渡すのがうまいタイプ",
        colors: ["#60a5fa", "#c084fc", "#121827"]
      }
    };

    const questions = [
      {
        text: "初めて行く場所で、まず気になるのは？",
        choices: [
          ["全体の地図と最短ルート", "cheat"],
          ["出口や人の流れ", "occult"],
          ["前に調べた情報との違い", "loop"],
          ["案内板やパンフレットの細かい説明", "librarian"]
        ]
      },
      {
        text: "自分の頑張りがあまり伝わっていないと感じたら？",
        choices: [
          ["成果を整理して静かに見せる", "exile"],
          ["笑って流しつつ別のやり方を探す", "weakest"],
          ["価値が伝わる相手を探す", "merchant"],
          ["黙って改善して次で見返す", "blacksmith"]
        ]
      },
      {
        text: "場が急にピリついたとき、あなたは？",
        choices: [
          ["原因を切り分けて対処する", "cheat"],
          ["まず相手を落ち着かせる", "tamer"],
          ["空気を軽くする一言を探す", "streamer"],
          ["誰が何を我慢しているか見る", "beast"]
        ]
      },
      {
        text: "誰かが小さなミスをした瞬間、あなたは？",
        choices: [
          ["場の空気ごと立て直す", "villainess"],
          ["ミスの起き方に違和感がないか見る", "occult"],
          ["代わりのものを用意する", "cook"],
          ["責める前に困っている人を確認する", "saint"]
        ]
      },
      {
        text: "便利になるなら、どの力がほしい？",
        choices: [
          ["全体像と履歴が一瞬で見える", "cheat"],
          ["手を動かせば何でも形にできる", "blacksmith"],
          ["相手の建前を自然に見抜ける", "villainess"],
          ["言葉にならない本音がわかる", "beast"]
        ]
      },
      {
        text: "好きなコンテンツで一番うれしい瞬間は？",
        choices: [
          ["伏線が全部つながった瞬間", "occult"],
          ["優しい人がちゃんと報われる瞬間", "saint"],
          ["地味な努力が効いてくる瞬間", "academy"],
          ["見ているだけでお腹が空く瞬間", "cook"]
        ]
      },
      {
        text: "休日に整えたい場所は？",
        choices: [
          ["植物や道具を置ける作業スペース", "slowlife"],
          ["音や映像を気にせず遊べる部屋", "streamer"],
          ["本や資料をまとめた棚", "librarian"],
          ["料理しやすいキッチン", "cook"]
        ]
      },
      {
        text: "揉めごとが一段落したあと、あなたは？",
        choices: [
          ["同じことが起きない仕組みを考える", "cheat"],
          ["経緯を記録して次に備える", "villainess"],
          ["残ったものをどう活かすか考える", "blacksmith"],
          ["まだ話せる余地があるか探す", "beast"]
        ]
      },
      {
        text: "一緒に作業するなら、しっくりくる相手は？",
        choices: [
          ["口は悪いけど知識が深い人", "exile"],
          ["不器用だけど素直な人", "tamer"],
          ["落ち着いて支えてくれる人", "villainess"],
          ["一緒に最後まで粘れる人", "academy"]
        ]
      },
      {
        text: "一番もやっとするのは？",
        choices: [
          ["説明不足で誰かが損をする", "saint"],
          ["試す前から無理だと決めつけられる", "exile"],
          ["生活の基盤が雑に扱われる", "slowlife"],
          ["交渉や調整の余地を見ない", "merchant"]
        ]
      },
      {
        text: "つい反応してしまう言葉は？",
        choices: [
          ["効率化", "cheat"],
          ["やり直し", "loop"],
          ["根回し", "villainess"],
          ["資料集", "librarian"]
        ]
      },
      {
        text: "理想のゴールに近いのは？",
        choices: [
          ["大きなことを終えて普通に暮らす", "weakest"],
          ["自分のペースで穏やかに過ごす", "slowlife"],
          ["大切な人と居場所を守る", "saint"],
          ["次の場所へ広げていく", "merchant"]
        ]
      }
    ];

    const state = {
      index: 0,
      answers: []
    };

    const startScreen = document.querySelector("#start-screen");
    const questionScreen = document.querySelector("#question-screen");
    const resultScreen = document.querySelector("#result-screen");
    const startButton = document.querySelector("#start-button");
    const backButton = document.querySelector("#back-button");
    const againButton = document.querySelector("#again-button");
    const progressLabel = document.querySelector("#progress-label");
    const meterBar = document.querySelector("#meter-bar");
    const questionTitle = document.querySelector("#question-title");
    const choicesEl = document.querySelector("#choices");
    const xShare = document.querySelector("#x-share");
    const shareUrl = "https://kawaire3-png.github.io/web-novel-diagnosis/";

    function show(screen) {
      [startScreen, questionScreen, resultScreen].forEach((item) => {
        item.classList.toggle("is-active", item === screen);
      });
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderQuestion() {
      const current = questions[state.index];
      const number = state.index + 1;
      progressLabel.textContent = `Q${number} / ${questions.length}`;
      meterBar.style.width = `${(number / questions.length) * 100}%`;
      questionTitle.textContent = current.text;
      backButton.style.visibility = state.index === 0 ? "hidden" : "visible";
      choicesEl.replaceChildren();

      current.choices.forEach(([label, type]) => {
        const button = document.createElement("button");
        button.className = "choice";
        button.type = "button";
        button.textContent = label;
        button.addEventListener("click", () => choose(type));
        choicesEl.append(button);
      });
    }

    function choose(type) {
      state.answers[state.index] = type;
      if (state.index < questions.length - 1) {
        state.index += 1;
        renderQuestion();
        return;
      }
      renderResult();
    }

    function pickResult() {
      const scores = Object.fromEntries(Object.keys(types).map((key) => [key, 0]));
      state.answers.forEach((type, index) => {
        scores[type] += 3;
        if (index % 3 === 0) scores[type] += 1;
      });
      return Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
    }

    function renderResult() {
      const key = pickResult();
      const result = types[key];

      document.querySelector("#result-code").textContent = `診断結果 / ${result.code}`;
      document.querySelector("#result-badge").textContent = result.genre.split(" / ")[0];
      document.querySelector("#result-name").textContent = result.name;
      document.querySelector("#novel-title").textContent = result.title;
      document.querySelector("#genre").textContent = result.genre;
      document.querySelector("#hero-type").textContent = result.hero;
      document.querySelector("#synopsis").textContent = result.synopsis;
      document.querySelector("#hook").textContent = result.hook;
      document.querySelector("#comment").textContent = result.comment;

      const shareText = `１２問で診断：私が書くWeb小説は「${result.name}」タイプ\n${result.title}\nジャンル：${result.genre}\n主人公属性：${result.hero}\n#Web小説家診断`;
      xShare.href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(shareUrl)}`;
      show(resultScreen);
    }

    startButton.addEventListener("click", () => {
      state.index = 0;
      state.answers = [];
      renderQuestion();
      show(questionScreen);
    });

    backButton.addEventListener("click", () => {
      if (state.index === 0) return;
      state.index -= 1;
      renderQuestion();
    });

    againButton.addEventListener("click", () => {
      state.index = 0;
      state.answers = [];
      show(startScreen);
    });
  </script>
</body>
</html>
